# Pre-commit hooks — run automatically before every `git commit`.
# Setup:  pip install pre-commit  (or brew install pre-commit)  &&  pre-commit install
# Run on demand:  pre-commit run --all-files
repos:
  # --- Secret scanning: blocks commits that contain keys/passwords/tokens ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # --- General hygiene + safety guards ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key          # PEM / SSH private keys
      - id: check-added-large-files     # blocks accidental large files (e.g. PDFs, vector dumps)
        args: ["--maxkb=1024"]
      - id: check-merge-conflict        # unresolved <<<<<<< markers
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # --- Python lint + format (replaces flake8 + black + isort) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff                        # lint
        args: ["--fix"]
      - id: ruff-format                 # format
